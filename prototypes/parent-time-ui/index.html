<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeviceLocker Parent UI</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell" id="app"></main>

    <div class="modal-backdrop" id="ruleModal" hidden>
      <section class="sheet" aria-labelledby="ruleModalTitle">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">報酬ルール</p>
            <h2 id="ruleModalTitle">項目を編集</h2>
          </div>
          <button class="icon-button" type="button" data-close-modal aria-label="閉じる">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="ruleForm" class="form-grid">
          <label>
            <span>項目名</span>
            <input id="ruleName" name="name" type="text" required maxlength="24" />
          </label>
          <label>
            <span>単位名</span>
            <input id="ruleUnit" name="unitName" type="text" required maxlength="8" />
          </label>
          <label>
            <span>1単位あたりの追加時間</span>
            <div class="number-input">
              <input id="ruleMinutes" name="minutesPerUnit" type="number" min="1" max="180" step="1" required />
              <span>分</span>
            </div>
          </label>
          <label class="switch-row">
            <input id="ruleAllowQuantity" name="allowQuantity" type="checkbox" />
            <span>
              <strong>複数まとめて入力する</strong>
              <small>ページ数や問題数をステッパーで指定できます</small>
            </span>
          </label>
          <div class="sheet-actions">
            <button class="secondary danger" type="button" id="deleteRuleButton">
              <i data-lucide="trash-2"></i>
              削除
            </button>
            <button class="secondary" type="button" data-close-modal>キャンセル</button>
            <button class="primary compact" type="submit">
              <i data-lucide="save"></i>
              保存
            </button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="manualModal" hidden>
      <section class="sheet" aria-labelledby="manualModalTitle">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">手動追加</p>
            <h2 id="manualModalTitle">時間を指定</h2>
          </div>
          <button class="icon-button" type="button" data-close-modal aria-label="閉じる">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="manualForm" class="form-grid">
          <label>
            <span>理由</span>
            <input id="manualReason" type="text" value="手動追加" required maxlength="24" />
          </label>
          <label>
            <span>追加時間</span>
            <div class="number-input">
              <input id="manualMinutes" type="number" value="10" min="1" max="180" required />
              <span>分</span>
            </div>
          </label>
          <div class="sheet-actions end">
            <button class="secondary" type="button" data-close-modal>キャンセル</button>
            <button class="primary compact" type="submit">
              <i data-lucide="calendar-plus"></i>
              追加
            </button>
          </div>
        </form>
      </section>
    </div>

    <script src="./src/lucide.min.js"></script>
    <script src="./src/config.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
